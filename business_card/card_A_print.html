<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>케어브릿지헬스 명함 — 옵션 A (다크 네이비)</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:    #0B2B4A;
      --navy2:   #0D3D63;
      --teal:    #0A8A7A;
      --teal-lt: #0DB89E;
      --gold:    #C8973A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── 화면용 ── */
    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #D0D8E0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
      gap: 40px;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #7A8A9A;
      margin-bottom: 10px;
    }

    .card-group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── 명함 공통 ── */
    .card {
      width: 90mm;
      height: 50mm;
      position: relative;
      overflow: hidden;
      border-radius: 2mm;
      box-shadow: 0 10px 36px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.12);
    }

    /* ══ 앞면 ══ */
    .front {
      background: linear-gradient(135deg, #0B2B4A 0%, #0E3A5C 55%, #104A72 100%);
      margin-bottom: 20px;
    }

    .front .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1.8mm;
      background: linear-gradient(90deg, var(--teal) 0%, var(--teal-lt) 50%, var(--gold) 100%);
    }

    .front .deco {
      position: absolute;
      border-radius: 50%;
    }
    .front .d1 { width: 28mm; height: 28mm; right: -10mm; bottom: -10mm; border: 1px solid rgba(13,184,158,.15); }
    .front .d2 { width: 18mm; height: 18mm; right: -5mm;  bottom: -5mm;  border: 1px solid rgba(200,151,58,.20); }
    .front .d3 { width:  9mm; height:  9mm; right:  4mm;  bottom:  4mm;  border: 1px solid rgba(13,184,158,.25); background: rgba(13,184,158,.06); }

    .front .inner {
      position: relative; z-index: 1;
      padding: 6.5mm 7.5mm 6mm;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .front .logo-ko {
      font-size: 5mm; font-weight: 800; letter-spacing: .03em; color: white; line-height: 1;
    }
    .front .logo-ko em { font-style: normal; color: var(--teal-lt); }
    .front .logo-en {
      font-size: 2mm; font-weight: 300; letter-spacing: .32em; color: rgba(255,255,255,.42); text-transform: uppercase; margin-top: .6mm;
    }

    .front .name-ko { font-size: 5.8mm; font-weight: 700; letter-spacing: .14em; color: white; line-height: 1; }
    .front .name-en { font-size: 2.4mm; font-weight: 300; letter-spacing: .08em; color: rgba(255,255,255,.58); margin-top: .8mm; }
    .front .title   { font-size: 2.6mm; font-weight: 600; color: var(--teal-lt); letter-spacing: .06em; margin-top: 1mm; }

    .front .contacts { display: flex; flex-direction: column; gap: .7mm; }
    .front .ci {
      display: flex; align-items: center; gap: 1.8mm;
      font-size: 2.3mm; color: rgba(255,255,255,.72);
    }
    .front .ci svg { width: 3mm; height: 3mm; flex-shrink: 0; opacity: .7; }

    /* ══ 뒷면 ══ */
    .back {
      background: linear-gradient(145deg, var(--teal) 0%, var(--teal-lt) 100%);
    }

    .back .deco-t {
      position: absolute; top: -10mm; right: -10mm;
      width: 26mm; height: 26mm; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.12);
    }
    .back .deco-b {
      position: absolute; bottom: -8mm; left: -8mm;
      width: 20mm; height: 20mm; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.10);
    }
    .back .inner {
      padding: 7mm 8mm;
      height: 100%;
      display: flex; flex-direction: column;
      justify-content: space-between;
      align-items: center; text-align: center;
      position: relative; z-index: 1;
    }

    .back .back-logo { font-size: 3.5mm; font-weight: 800; letter-spacing: .04em; color: white; }
    .back .back-logo span { font-weight: 300; color: rgba(255,255,255,.55); }

    .back .slogan-ko { font-size: 5mm; font-weight: 700; line-height: 1.45; letter-spacing: .04em; color: white; }
    .back .slogan-en { font-size: 2.3mm; font-weight: 300; letter-spacing: .18em; color: rgba(255,255,255,.62); margin-top: 1.5mm; }

    .back .info { font-size: 2mm; color: rgba(255,255,255,.58); line-height: 2; }

    /* ── 인쇄 ── */
    @page {
      size: A4;
      margin: 20mm;
    }

    @media print {
      body {
        background: white;
        padding: 0;
        gap: 15mm;
        min-height: auto;
      }

      .label { display: none; }

      .card {
        box-shadow: none;
        border: 0.3mm solid #CCCCCC;
        border-radius: 0;
        page-break-inside: avoid;
      }

      .front { margin-bottom: 15mm; }
    }
  </style>
</head>
<body>

  <!-- 앞면 -->
  <div class="card-group">
    <p class="label">앞면 (Front)</p>
    <div class="card front">
      <div class="top-bar"></div>
      <div class="deco d1"></div>
      <div class="deco d2"></div>
      <div class="deco d3"></div>
      <div class="inner">
        <div>
          <div class="logo-ko"><em>케어</em>브릿지헬스</div>
          <div class="logo-en">C A R E B R I D G E &nbsp; H E A L T H</div>
        </div>
        <div>
          <div class="name-ko">심영은</div>
          <div class="name-en">Youngeun Sim</div>
          <div class="title">대표이사 &nbsp;/&nbsp; CEO</div>
        </div>
        <div class="contacts">
          <div class="ci">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.6 3.32C1.58 2.18 2.4 1 3.54 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.51a16 16 0 0 0 5.9 5.9l.92-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.73 16z"/></svg>
            010-9870-0831
          </div>
          <div class="ci">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            2015sim@naver.com
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 뒷면 -->
  <div class="card-group">
    <p class="label">뒷면 (Back)</p>
    <div class="card back">
      <div class="deco-t"></div>
      <div class="deco-b"></div>
      <div class="inner">
        <div class="back-logo">케어브릿지헬스 <span>/ CareBridge Health</span></div>
        <div>
          <div class="slogan-ko">건강을 잇다,<br>삶을 바꾸다</div>
          <div class="slogan-en">Bridging Health · Changing Lives</div>
        </div>
        <div class="info">
          2015sim@naver.com<br>
          010-9870-0831
        </div>
      </div>
    </div>
  </div>

</body>
</html>
