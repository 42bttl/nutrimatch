<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 찾기 — NutriMatch</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

{% include "partials/_nav.html" %}

<div class="page-body">
  <div class="container" style="max-width: 460px;">
    <div class="form-card">
      <div class="form-card-header">
        <h1>🔑 비밀번호 찾기</h1>
        <p>가입한 이메일로 재설정 링크를 보내드립니다</p>
      </div>
      <div class="form-card-body">

        {% if error %}
        <div class="alert alert-error">⚠️ {{ error }}</div>
        {% endif %}

        {% if message %}
        <div class="alert alert-success">📧 {{ message }}</div>
        {% else %}
        <form method="POST" action="/forgot-password">
          <div class="form-group">
            <label class="required" for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" required autofocus>
          </div>
          <button type="submit" class="btn btn-primary btn-full" style="font-size: 15px; padding: 13px; margin-top: 8px;">
            재설정 링크 보내기
          </button>
        </form>
        {% endif %}

        <div style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-sub);">
          <a href="/login" style="color: var(--accent-dark); font-weight: 600;">로그인으로 돌아가기</a>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
