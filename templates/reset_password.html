<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 — NutriMatch</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

{% include "partials/_nav.html" %}

<div class="page-body">
  <div class="container" style="max-width: 460px;">
    <div class="form-card">
      <div class="form-card-header">
        <h1>🔒 비밀번호 재설정</h1>
        <p>새 비밀번호를 입력해주세요</p>
      </div>
      <div class="form-card-body">

        {% if error %}
        <div class="alert alert-error">⚠️ {{ error }}</div>
        {% endif %}

        {% if token %}
        <form method="POST" action="/reset-password">
          <input type="hidden" name="token" value="{{ token }}">
          <div class="form-group">
            <label class="required" for="password">새 비밀번호 (8자 이상)</label>
            <input type="password" id="password" name="password" minlength="8" required autofocus>
          </div>
          <div class="form-group">
            <label class="required" for="password_confirm">새 비밀번호 확인</label>
            <input type="password" id="password_confirm" name="password_confirm" minlength="8" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full" style="font-size: 15px; padding: 13px; margin-top: 8px;">
            비밀번호 변경
          </button>
        </form>
        {% else %}
        <div style="text-align: center;">
          <a href="/forgot-password" class="btn btn-outline">재설정 다시 요청하기</a>
        </div>
        {% endif %}

      </div>
    </div>
  </div>
</div>

<script>
  const form = document.querySelector('form');
  if (form) {
    form.addEventListener('submit', function(e) {
      const pw = document.getElementById('password').value;
      const pw2 = document.getElementById('password_confirm').value;
      if (pw !== pw2) {
        e.preventDefault();
        alert('비밀번호가 서로 일치하지 않습니다.');
      }
    });
  }
</script>

</body>
</html>
