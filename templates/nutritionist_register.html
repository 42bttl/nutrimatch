<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영양사 등록 — NutriMatch</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><span>🥗</span> NutriMatch</a>
    <div class="nav-links">
      <a href="/">홈</a>
      <a href="/nutritionists">영양사 목록</a>
      <a href="/nutritionists/register" class="active">영양사 등록</a>
      <a href="/companies/request">서비스 신청</a>
      <a href="/bookings">예약 현황</a>
    </div>
  </div>
</nav>

<div class="page-body">
  <div class="container">
    <div class="form-card">
      <div class="form-card-header">
        <h1>👩‍⚕️ 영양사 등록</h1>
        <p>전문 영양사로 등록하고 기업 고객과 연결되세요</p>
      </div>
      <div class="form-card-body">

        {% if error %}
        <div class="alert alert-error">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/nutritionists/register">

          <!-- 기본 정보 -->
          <div class="form-section">
            <div class="form-section-title">기본 정보</div>

            <div class="form-row">
              <div class="form-group">
                <label class="required" for="name">이름</label>
                <input type="text" id="name" name="name" placeholder="홍길동" required value="{{ form.name or '' }}">
              </div>
              <div class="form-group">
                <label class="required" for="license_number">면허 번호</label>
                <input type="text" id="license_number" name="license_number"
                       placeholder="예: RD-2024-00001" required value="{{ form.license_number or '' }}">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="required" for="specialty">전문 분야</label>
                <select id="specialty" name="specialty" required>
                  <option value="">선택하세요</option>
                  <option value="clinical" {% if form.specialty == 'clinical' %}selected{% endif %}>임상영양</option>
                  <option value="sports" {% if form.specialty == 'sports' %}selected{% endif %}>스포츠영양</option>
                  <option value="elderly" {% if form.specialty == 'elderly' %}selected{% endif %}>노인영양</option>
                  <option value="pediatric" {% if form.specialty == 'pediatric' %}selected{% endif %}>소아영양</option>
                </select>
              </div>
              <div class="form-group">
                <label class="required" for="region">활동 지역</label>
                <select id="region" name="region" required>
                  <option value="">선택하세요</option>
                  <option value="seoul">서울</option>
                  <option value="gyeonggi">경기</option>
                  <option value="incheon">인천</option>
                  <option value="busan">부산</option>
                  <option value="daegu">대구</option>
                  <option value="gwangju">광주</option>
                  <option value="daejeon">대전</option>
                  <option value="ulsan">울산</option>
                  <option value="sejong">세종</option>
                  <option value="gangwon">강원</option>
                  <option value="chungbuk">충북</option>
                  <option value="chungnam">충남</option>
                  <option value="jeonbuk">전북</option>
                  <option value="jeonnam">전남</option>
                  <option value="gyeongbuk">경북</option>
                  <option value="gyeongnam">경남</option>
                  <option value="jeju">제주</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="required" for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="example@email.com"
                       required value="{{ form.email or '' }}">
              </div>
              <div class="form-group">
                <label class="required" for="phone">연락처</label>
                <input type="tel" id="phone" name="phone" placeholder="010-0000-0000"
                       required value="{{ form.phone or '' }}">
              </div>
            </div>
          </div>

          <!-- 상담 조건 -->
          <div class="form-section">
            <div class="form-section-title">상담 조건</div>

            <div class="form-group">
              <label class="required">가능 요일</label>
              <div class="checkbox-group">
                {% for day_val, day_label in [('mon','월'), ('tue','화'), ('wed','수'), ('thu','목'), ('fri','금'), ('sat','토'), ('sun','일')] %}
                <label class="checkbox-item">
                  <input type="checkbox" name="available_days" value="{{ day_val }}">
                  {{ day_label }}요일
                </label>
                {% endfor %}
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="required" for="available_time_start">가능 시작 시간</label>
                <input type="time" id="available_time_start" name="available_time_start" required value="{{ form.available_time_start or '09:00' }}">
              </div>
              <div class="form-group">
                <label class="required" for="available_time_end">가능 종료 시간</label>
                <input type="time" id="available_time_end" name="available_time_end" required value="{{ form.available_time_end or '18:00' }}">
              </div>
            </div>

            <div class="form-group">
              <label class="required" for="hourly_rate">시간당 요금 (원)</label>
              <input type="number" id="hourly_rate" name="hourly_rate"
                     placeholder="예: 80000" min="0" step="1000"
                     required value="{{ form.hourly_rate or '' }}">
            </div>
          </div>

          <!-- 소개 -->
          <div class="form-section">
            <div class="form-section-title">소개</div>
            <div class="form-group">
              <label for="bio">자기소개</label>
              <textarea id="bio" name="bio" rows="4"
                        placeholder="경력, 전문성, 상담 스타일 등을 자유롭게 작성해주세요">{{ form.bio or '' }}</textarea>
            </div>
          </div>

          <button type="submit" class="btn btn-green btn-full" style="font-size: 16px; padding: 14px;">
            등록하기
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

</body>
</html>
